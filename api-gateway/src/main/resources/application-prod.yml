server:
  port: 8081

spring:

  application:
    name: api-gateway

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

  cloud:

    gateway:

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        corsConfigurations:

          '[/**]':

            allowedOrigins: "*"

            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

            allowedHeaders: "*"

      routes:

        - id: user-service
          uri: lb://USER-SERVICE

          predicates:
            - Path=/auth/**

        - id: order-service
          uri: lb://ORDER-SERVICE

          predicates:
            - Path=/orders/**

        - id: payment-service
          uri: lb://PAYMENT-SERVICE

          predicates:
            - Path=/payments/**

          filters:
            - name: Retry

              args:
                retries: 3

                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE

                methods:
                  - GET
                  - POST

            - name: CircuitBreaker

              args:
                name: paymentServiceCircuitBreaker
                fallbackUri: forward:/fallback/payment

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE

          predicates:
            - Path=/inventory/**

          filters:
            - name: Retry

              args:
                retries: 3

                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE

                methods:
                  - GET
                  - POST

            - name: CircuitBreaker

              args:
                name: inventoryServiceCircuitBreaker
                fallbackUri: forward:/fallback/inventory

        - id: shipment-service
          uri: lb://SHIPMENT-SERVICE

          predicates:
            - Path=/shipments/**

          filters:
            - name: Retry

              args:
                retries: 3

                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE

                methods:
                  - GET
                  - POST

            - name: CircuitBreaker

              args:
                name: shipmentServiceCircuitBreaker
                fallbackUri: forward:/fallback/shipment

        - id: return-service
          uri: lb://RETURN-SERVICE

          predicates:
            - Path=/returns/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE

          predicates:
            - Path=/notifications/**


management:

  tracing:
    sampling:
      probability: 1.0

  endpoint:
    prometheus:
      enabled: true

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  metrics:
    tags:
      application: ${spring.application.name}


resilience4j:

  circuitbreaker:

    instances:

      paymentServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      inventoryServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      shipmentServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10


  retry:

    instances:

      paymentServiceRetry:
        maxAttempts: 3
        waitDuration: 2s

      inventoryServiceRetry:
        maxAttempts: 3
        waitDuration: 2s

      shipmentServiceRetry:
        maxAttempts: 3
        waitDuration: 2s


  timelimiter:

    instances:

      paymentServiceCircuitBreaker:
        timeout-duration: 3s

      inventoryServiceCircuitBreaker:
        timeout-duration: 3s

      shipmentServiceCircuitBreaker:
        timeout-duration: 3s


  bulkhead:

    instances:

      paymentServiceBulkhead:
        max-concurrent-calls: 5
        max-wait-duration: 1s

      inventoryServiceBulkhead:
        max-concurrent-calls: 5
        max-wait-duration: 1s

      shipmentServiceBulkhead:
        max-concurrent-calls: 5
        max-wait-duration: 1s


feign:
  hystrix:
    enabled: true


eureka:

  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/

  instance:
    prefer-ip-address: true


logging:

  level:

    root: INFO

    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
    reactor.netty.http.server: INFO