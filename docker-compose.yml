version: '3.9'

services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CLUSTER_ID: intelligent-supply-chain-cluster

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin

    ports:
      - "9411:9411"


  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile

    image: intelligent-discovery-server

    container_name: discovery-server

    ports:
      - "8761:8761"


  user-db:
    image: postgres:16

    container_name: user-db

    environment:
      POSTGRES_DB: supply_userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - user-db-data:/var/lib/postgresql/data

  order-db:
    image: postgres:16

    container_name: order-db

    environment:
      POSTGRES_DB: supply_orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5434:5432"

    volumes:
      - order-db-data:/var/lib/postgresql/data

  inventory-db:
    image: postgres:16

    container_name: inventory-db

    environment:
      POSTGRES_DB: supply_inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - inventory-db-data:/var/lib/postgresql/data

  payment-db:
    image: postgres:16

    container_name: payment-db

    environment:
      POSTGRES_DB: supply_paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5436:5432"

    volumes:
      - payment-db-data:/var/lib/postgresql/data


  shipment-db:
    image: postgres:16

    container_name: shipment-db

    environment:
      POSTGRES_DB: supply_shipmentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5437:5432"

    volumes:
      - shipment-db-data:/var/lib/postgresql/data

  return-db:
    image: postgres:16

    container_name: return-db

    environment:
      POSTGRES_DB: supply_returndb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5438:5432"

    volumes:
      - return-db-data:/var/lib/postgresql/data

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile

    image: intelligent-user-service

    container_name: user-service

    depends_on:
      - user-db
      - kafka
      - discovery-server

    ports:
      - "9020:9020"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile

    image: intelligent-order-service

    container_name: order-service

    depends_on:
      - order-db
      - kafka
      - discovery-server

    ports:
      - "9010:9010"


  inventory-service:
    build:
      context: .
      dockerfile: Inventory-service/Dockerfile

    image: intelligent-inventory-service

    container_name: inventory-service

    depends_on:
      - inventory-db
      - kafka
      - discovery-server

    ports:
      - "9030:9030"

  payment-service:
    build:
      context: .
      dockerfile: Payment-service/Dockerfile

    image: intelligent-payment-service

    container_name: payment-service

    depends_on:
      - payment-db
      - kafka
      - discovery-server

    ports:
      - "9050:9050"


  shipment-service:
    build:
      context: .
      dockerfile: shipment-service/Dockerfile

    image: intelligent-shipment-service

    container_name: shipment-service

    depends_on:
      - shipment-db
      - kafka
      - discovery-server

    ports:
      - "9060:9060"


  return-service:
    build:
      context: .
      dockerfile: return-service/Dockerfile

    image: intelligent-return-service

    container_name: return-service

    depends_on:
      - return-db
      - discovery-server

    ports:
      - "9080:9080"



  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile

    image: intelligent-api-gateway

    container_name: api-gateway

    depends_on:
      - discovery-server

    ports:
      - "8081:8081"


  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - api-gateway
      - user-service
      - order-service
      - inventory-service
      - payment-service
      - shipment-service
      - return-service


  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    volumes:
      - grafana-data:/var/lib/grafana





volumes:
  user-db-data:
  order-db-data:
  inventory-db-data:
  payment-db-data:
  shipment-db-data:
  return-db-data:
  grafana-data: