apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: intelligent-supply-chain

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway


  template:
    metadata:
      labels:
        app: api-gateway


    spec:
      containers:

        - name: api-gateway
          image:  yash01er/intelligent-api-gateway:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 8081


          env:
            - name: SPRING_PROFILE_ACTIVE
              value: prod
