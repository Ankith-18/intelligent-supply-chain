apiVersion: apps/v1
kind: Deployment


metadata:
  name: payment-service
  namespace: intelligent-supply-chain


spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service


  template:

    metadata:
      labels:
        app: payment-service


    spec:

      containers:
        - name: payment-service
          image: yash01er/intelligent-payment-service:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 9050

          env:
            - name: SPRING_PROFILE_ACTIVE
              value: prod
