apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-db
  namespace: intelligent-supply-chain

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-db

  template:

    metadata:
      labels:
        app: order-db

    spec:

      containers:

        - name: order-db

          image: postgres:16

          ports:
            - containerPort: 5432

          env:

            - name: POSTGRES_DB
              value: supply_orderdb

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

---
apiVersion: v1
kind: Service

metadata:
  name: order-db
  namespace: intelligent-supply-chain

spec:

  selector:
    app: order-db

  ports:
    - port: 5432
      targetPort: 5432

  type: ClusterIP