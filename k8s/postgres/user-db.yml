
apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-db
  namespace: intelligent-supply-chain

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-db

  template:

    metadata:
      labels:
        app: user-db

    spec:

      containers:

        - name: user-db

          image: postgres:16

          ports:
            - containerPort: 5432

          env:

            - name: POSTGRES_DB
              value: supply_userdb

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

---

apiVersion: v1
kind: Service

metadata:
  name: user-db
  namespace: intelligent-supply-chain

spec:

  selector:
    app: user-db

  ports:
    - port: 5432
      targetPort: 5432

  type: ClusterIP