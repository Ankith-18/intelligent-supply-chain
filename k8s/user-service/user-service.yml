apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service
  namespace: intelligent-supply-chain

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:

    metadata:
      labels:
        app: user-service

    spec:

      containers:

        - name: user-service

          image: yash01er/intelligent-user-service:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 9020

          env:

            - name: SPRING_PROFILES_ACTIVE
              value: prod

---
apiVersion: v1
kind: Service

metadata:
  name: user-service
  namespace: intelligent-supply-chain

spec:

  selector:
    app: user-service

  ports:
    - port: 9020
      targetPort: 9020

  type: ClusterIP